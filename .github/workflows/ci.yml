name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Set up Tcl
      run: |
        sudo apt-get update
        sudo apt-get install -y tcl tcl-dev expect
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        cd gateway && pip install -r requirements.txt
    
    - name: Run Tcl tests
      run: |
        cd tests
        tclsh all.tcl
    
    - name: Run Python integrity tests
      run: |
        python3 -m pytest gateway/tests/test_integrity.py -q

    - name: Run main Python suite
      run: |
        python3 -m pytest tests/ gateway/tests/ -q -m "not slow and not selenium and not external"

    - name: Run JavaScript tests
      run: |
        grep -v '^#' scripts/js-tests.manifest | grep -v '^[[:space:]]*$' | xargs node --test

    - name: Run API tests
      run: |
        python3 tests/quick-test-api.py

    - name: Run benchmark suite
      run: |
        tclsh tests/benchmark.tcl
  
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install pylint flake8
    
    - name: Lint Python files
      run: |
        find gateway -name "*.py" -type f | xargs pylint --exit-zero
        find gateway -name "*.py" -type f | xargs flake8 --exit-zero
  
  coverage:
    name: Coverage (gateway)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install coverage tools
      run: |
        python -m pip install --upgrade pip
        pip install coverage pytest
    
    - name: Run gateway tests with coverage
      run: |
        cd gateway
        coverage run -m pytest tests/ -q
        coverage report
        coverage html
    
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: gateway/htmlcov/

  ui-tests:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install browser and selenium
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver || sudo apt-get install -y chromium-driver chromium
        python -m pip install --upgrade pip
        pip install selenium

    - name: Run Selenium smoke tests
      env:
        CHROME_BIN: /usr/bin/chromium
      run: |
        python3 tests/test_web_ui_selenium.py

<header class="r2ctl-page-header">
  <div class="flex items-start gap-3">
    <button id="sidebar_toggle" class="r2ctl-mobile-nav-toggle mt-1" aria-label="Abrir menu">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    <div>
      <p class="r2ctl-kicker text-xs font-medium uppercase tracking-[0.24em]">{{page_kicker}}</p>
      <h1 class="mt-1 text-2xl font-semibold tracking-[0.08em] text-stone-50 sm:text-3xl">{{page_title}}</h1>
      <p class="mt-2 max-w-3xl text-sm text-stone-300">{{page_description}}</p>
    </div>
  </div>
</header>

<div class="grid gap-6 xl:grid-cols-[1.15fr_0.85fr]">
  <section class="r2ctl-card rounded-3xl p-5 shadow-inner shadow-black/20">
    <div class="mb-4 flex items-center justify-between gap-3">
      <div>
        <h2 class="r2ctl-section-title text-lg font-semibold">Nova run</h2>
        <p class="r2ctl-section-copy text-sm">Fluxo dedicado à criação, sem mistura com catálogo, fila e monitoramento.</p>
      </div>
      <div id="run_form_status" class="text-sm text-stone-400">pronto</div>
    </div>
    <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
      <input id="log_dir" placeholder="log_dir" class="r2ctl-input r2ctl-col-span-xl-2" />
      <select id="target_env_id" title="Ambiente alvo" class="r2ctl-input">
        <option value="">ambiente alvo manual</option>
      </select>
      <select id="connection_profile_id" title="Perfil de conexão" class="r2ctl-input">
        <option value="">perfil de conexão manual</option>
      </select>
      <input id="target_host" placeholder="host alvo" class="r2ctl-input" />
      <input id="target_user" placeholder="usuário alvo" class="r2ctl-input" />
      <input id="target_cmd" placeholder="comando alvo opcional" class="r2ctl-input r2ctl-col-span-md-2 r2ctl-col-span-xl-2" />
      <select id="mode" title="Modo de execução" class="r2ctl-input">
        <option value="strict-global">sequencial estrito</option>
        <option value="parallel-sessions">paralelo por sessão</option>
      </select>
      <select id="on_mismatch" title="Ação ao divergir" class="r2ctl-input">
        <option value="continue">ao divergir: continuar</option>
        <option value="fail-fast">ao divergir: falhar rápido</option>
      </select>
      <input id="concurrency" placeholder="concorrência" class="r2ctl-input" />
      <input id="ramp" placeholder="rampa por segundo" class="r2ctl-input" />
      <input id="speed" placeholder="aceleração" class="r2ctl-input" />
      <input id="jitter" placeholder="jitter em ms" class="r2ctl-input" />
      <input id="user_pool" placeholder="pool de usuários csv" class="r2ctl-input r2ctl-col-span-md-2 r2ctl-col-span-xl-2" />
    </div>
    <div class="mt-3 grid gap-3 md:grid-cols-2 xl:grid-cols-4">
      <input id="replay_from_seq_global" placeholder="reprocessar de seq_global" class="r2ctl-input" />
      <input id="replay_to_seq_global" placeholder="reprocessar até seq_global" class="r2ctl-input" />
      <input id="replay_session_id" placeholder="session_id" class="r2ctl-input" />
      <input id="replay_from_checkpoint_sig" placeholder="checkpoint sig" class="r2ctl-input" />
    </div>
    <div class="mt-3 grid gap-3 md:grid-cols-2 xl:grid-cols-4">
      <select id="input_mode" title="Modo de input" class="r2ctl-input">
        <option value="raw">replay bruto por bytes</option>
        <option value="deterministic">replay determinístico por tela</option>
      </select>
      <select id="on_deterministic_mismatch" title="Ao divergir no modo determinístico" class="r2ctl-input">
        <option value="fail-fast">determinístico divergiu: falhar</option>
        <option value="skip">determinístico divergiu: pular ação</option>
        <option value="send-anyway">determinístico divergiu: enviar mesmo assim</option>
      </select>
      <select id="match_mode" title="Modo de matching" class="r2ctl-input">
        <option value="strict">matching estrito</option>
        <option value="contains">matching por contains</option>
        <option value="regex">matching por regex</option>
        <option value="fuzzy">matching fuzzy</option>
      </select>
      <input id="match_threshold" type="number" min="0" max="1" step="0.01" placeholder="limiar fuzzy (0-1)" class="r2ctl-input" />
      <label class="r2ctl-inline-chip inline-flex items-center gap-2 rounded-full px-4 py-2">
        <input id="match_ignore_case" type="checkbox" class="r2ctl-checkbox h-4 w-4 rounded border-stone-600 bg-stone-900 text-pink-500" />
        ignorar maiúsculas/minúsculas
      </label>
    </div>
    <div class="mt-4 flex flex-wrap gap-3">
      <button id="create_run_btn" class="r2ctl-btn-primary">Criar run</button>
      <a href="/runs" class="r2ctl-btn-soft">Ir para fila</a>
    </div>
  </section>

  <section class="space-y-6">
    <section class="r2ctl-card rounded-3xl p-5 shadow-inner shadow-black/20">
      <div class="mb-4 flex items-center justify-between gap-3">
        <div>
          <h2 class="r2ctl-section-title text-lg font-semibold">Ambientes</h2>
          <p class="r2ctl-section-copy text-sm">Cadastro leve de ambientes alvo para reutilização.</p>
        </div>
        <button id="refresh_targets_btn" class="r2ctl-btn-soft">Atualizar</button>
      </div>
      <div class="grid gap-3 md:grid-cols-2">
        <input id="target_env_name" placeholder="nome do ambiente" class="r2ctl-input" />
        <input id="target_env_host" placeholder="host" class="r2ctl-input" />
        <input id="target_env_env_id" placeholder="env_id opcional" class="r2ctl-input" />
        <input id="target_env_port" type="number" min="1" placeholder="porta" class="r2ctl-input" />
        <select id="target_env_platform" title="Plataforma" class="r2ctl-input">
          <option value="linux">linux</option>
          <option value="aix">aix</option>
        </select>
        <select id="target_env_transport_hint" title="Transporte" class="r2ctl-input">
          <option value="ssh">ssh</option>
          <option value="telnet">telnet</option>
        </select>
        <select id="target_env_direct_ssh_policy" title="Política SSH direto" class="r2ctl-input">
          <option value="unrestricted">ssh direto irrestrito</option>
          <option value="gateway_only">gateway only</option>
          <option value="admin_only">somente admin</option>
          <option value="disabled">desabilitado</option>
        </select>
        <select id="target_env_capture_start_mode" title="Modo de início de captura" class="r2ctl-input">
          <option value="session_start_required">captura exige session_start</option>
          <option value="login_required">captura exige login</option>
        </select>
        <select id="target_env_capture_compliance_mode" title="Modo de compliance de captura" class="r2ctl-input">
          <option value="off">compliance off</option>
          <option value="warn">warn</option>
          <option value="strict">strict</option>
        </select>
        <input id="target_env_gateway_host" placeholder="gateway host" class="r2ctl-input" />
        <input id="target_env_gateway_user" placeholder="gateway user" class="r2ctl-input" />
        <input id="target_env_gateway_port" type="number" min="1" placeholder="gateway port" class="r2ctl-input" />
      </div>
      <div class="mt-3 flex flex-wrap gap-3 text-xs text-stone-300">
        <label class="r2ctl-inline-chip inline-flex items-center gap-2 rounded-full px-4 py-2">
          <input id="target_env_gateway_required" type="checkbox" class="r2ctl-checkbox h-4 w-4 rounded border-stone-600 bg-stone-900 text-pink-500" />
          target gateway-only
        </label>
        <label class="r2ctl-inline-chip inline-flex items-center gap-2 rounded-full px-4 py-2">
          <input id="target_env_allow_admin_direct_access" type="checkbox" class="r2ctl-checkbox h-4 w-4 rounded border-stone-600 bg-stone-900 text-pink-500" />
          permitir admin direto
        </label>
      </div>
      <div class="mt-3">
        <input id="target_env_description" placeholder="descrição operacional" class="r2ctl-input r2ctl-input-full" />
      </div>
      <div class="mt-3 flex flex-wrap gap-3">
        <button id="create_target_btn" class="r2ctl-btn-soft">Salvar ambiente</button>
        <span id="targets_status" class="text-xs text-stone-500">carregando</span>
      </div>
    </section>

    <section class="r2ctl-card rounded-3xl p-5 shadow-inner shadow-black/20">
      <div class="mb-4 flex items-center justify-between gap-3">
        <div>
          <h2 class="r2ctl-section-title text-lg font-semibold">Perfis de conexão</h2>
          <p class="r2ctl-section-copy text-sm">Cadastros reutilizáveis para transporte, usuário e credencial.</p>
        </div>
        <button id="refresh_profiles_btn" class="r2ctl-btn-soft">Atualizar</button>
      </div>
      <div class="grid gap-3 md:grid-cols-2">
        <input id="connection_profile_name" placeholder="nome do perfil" class="r2ctl-input" />
        <input id="connection_profile_profile_id" placeholder="profile_id opcional" class="r2ctl-input" />
        <select id="connection_profile_transport" title="Transporte do perfil" class="r2ctl-input">
          <option value="ssh">ssh</option>
          <option value="telnet">telnet</option>
        </select>
        <input id="connection_profile_username" placeholder="usuário padrão" class="r2ctl-input" />
        <input id="connection_profile_port" type="number" min="1" placeholder="porta" class="r2ctl-input" />
        <input id="connection_profile_command" placeholder="comando padrão" class="r2ctl-input" />
      </div>
      <div class="mt-3">
        <input id="connection_profile_credential_ref" placeholder="credential_ref" class="r2ctl-input r2ctl-input-full" />
      </div>
      <div class="mt-3 flex flex-wrap gap-3">
        <button id="create_profile_btn" class="r2ctl-btn-soft">Salvar perfil</button>
        <span id="profiles_status" class="text-xs text-stone-500">carregando</span>
      </div>
    </section>
  </section>
</div>

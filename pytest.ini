[pytest]
testpaths = tests gateway/tests
pythonpath = gateway

markers =
    unit: Testes unitarios rapidos
    p2: P2-A Synthetic Knowledge Base
    control: Control plane / API server tests
    integration: Testes de integracao
    slow: Testes lentos (servidor real, timeouts)
    selenium: Testes de browser com Selenium
    external: Testes que dependem de servico externo ou ambiente especifico
